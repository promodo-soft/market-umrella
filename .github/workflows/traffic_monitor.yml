name: Traffic Monitor

on:
  schedule:
    - cron: '0 10 * * 1'  # Каждый понедельник в 10:00 GMT+2
  workflow_dispatch:  # Позволяет запускать вручную

jobs:
  monitor:
    runs-on: ubuntu-20.04  # Используем конкретную версию Ubuntu
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.8'  # Используем Python 3.8
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip wheel setuptools
        pip install pandas==1.5.3 --no-deps
        pip install numpy==1.23.5
        pip install pytz python-dateutil six
        pip install -r requirements.txt
    
    - name: Run monitor
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        SHEET_ID: ${{ secrets.SHEET_ID }}
      run: python run_test.py 